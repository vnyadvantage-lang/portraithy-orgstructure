<title>Portraithy · Доступ</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
html,body{height:100%}
body{font-family:'Manrope',-apple-system,sans-serif;background:#f3f4ef;color:#1c1d1f}
.gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:1.5rem;background:#f3f4ef}
.card{background:#fff;border:1px solid rgba(22,24,18,.08);border-radius:20px;padding:2.4rem 2rem;max-width:360px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(22,24,18,.07)}
.logo{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#1c1d1f,#3a3b3d);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;margin:0 auto 1.1rem}
.card h2{font-size:19px;font-weight:800;letter-spacing:-.3px}
.card p{font-size:12.5px;color:#83878a;margin:.35rem 0 1.5rem}
.card input{width:100%;background:#fff;border:1px solid rgba(22,24,18,.13);border-radius:9px;padding:11px 12px;font-size:13.5px;font-family:inherit;margin-bottom:.6rem;outline:none}
.card input:focus{border-color:#3f7ad1;box-shadow:0 0 0 3px rgba(63,122,209,.12)}
.card button{width:100%;background:#3f7ad1;color:#fff;border:none;border-radius:9px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:.3rem}
.card button:hover{background:#2f63b5}
.err{color:#e0603a;font-size:12px;min-height:16px;margin-top:.7rem;font-weight:600}
#app{display:none;border:0;width:100%;height:100%}
</style>
</head>
<body>
<div class="gate" id="gate">
  <div class="card">
    <div class="logo">P</div>
    <h2>Portraithy</h2>
    <p>Организационная структура · доступ по логину</p>
    <input id="u" placeholder="Логин" autocomplete="username">
    <input id="p" type="password" placeholder="Пароль" autocomplete="current-password">
    <button id="btn">Войти</button>
    <div class="err" id="err"></div>
  </div>
</div>

function b64(s){const b=atob(s),u=new Uint8Array(b.length);for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u;}
async function decrypt(pw){
  const baseKey=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:200000,hash:'SHA-256'},baseKey,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(DATA));
  return new TextDecoder().decode(pt);
}
function showApp(html){document.getElementById('gate').style.display='none';const f=document.getElementById('app');f.style.display='block';f.srcdoc=html;}
async function attempt(u,pw,silent){
  if(String(u).trim().toLowerCase()!==LOGIN.toLowerCase()){if(!silent)fail('Неверный логин или пароль');return;}
  try{const html=await decrypt(pw);sessionStorage.setItem('pa_u',u);sessionStorage.setItem('pa_p',pw);showApp(html);}
  catch(e){if(!silent)fail('Неверный логин или пароль');}
}
function fail(m){document.getElementById('err').textContent=m;}
document.getElementById('btn').onclick=()=>attempt(document.getElementById('u').value,document.getElementById('p').value,false);
document.getElementById('p').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('btn').click();});
document.getElementById('u').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('p').focus();});
(function(){const u=sessionStorage.getItem('pa_u'),p=sessionStorage.getItem('pa_p');if(u&&p)attempt(u,p,true);})();
