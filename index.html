<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
html,body{height:100%}
body{font-family:'Poppins',-apple-system,sans-serif;background:#fffdf9;color:#1c2c28}
.gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:1.5rem;background:#fffdf9}
.card{background:#fff;border:1px solid rgba(28,44,40,.1);border-radius:20px;padding:2.4rem 2rem;max-width:370px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(28,44,40,.08)}
.glogo{height:58px;width:58px;border-radius:15px;margin:0 auto .9rem;display:block}
.gbrand{font-family:'Libre Baskerville',Georgia,serif;font-size:22px;font-weight:700;color:#1c2c28;line-height:1.1}
.gslogan{font-family:'Libre Baskerville',Georgia,serif;font-style:italic;font-size:13px;color:#c45a2a;margin-top:3px}
.card p{font-size:12px;color:#8a8578;margin:.5rem 0 1.5rem}
.card input{width:100%;background:#fff;border:1px solid rgba(28,44,40,.14);border-radius:9px;padding:11px 12px;font-size:13.5px;font-family:inherit;margin-bottom:.6rem;outline:none;color:#1c2c28}
.card input:focus{border-color:#c45a2a;box-shadow:0 0 0 3px rgba(196,90,42,.13)}
.card button{width:100%;background:#c45a2a;color:#fff;border:none;border-radius:9px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:.3rem}
.card button:hover{background:#a8481f}
.err{color:#cf2e2e;font-size:12px;min-height:16px;margin-top:.7rem;font-weight:600}
#app{display:none;border:0;width:100%;height:100%}
</style>

function b64(s){const b=atob(s),u=new Uint8Array(b.length);for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u;}
async function unlock(login,pw){
  const rec=USERS.find(x=>x.login.toLowerCase()===String(login).trim().toLowerCase());
  if(!rec)throw 0;
  const base=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const uKey=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(rec.salt),iterations:200000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);
  const masterRaw=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(rec.iv)},uKey,b64(rec.wrapped));
  const mKey=await crypto.subtle.importKey('raw',masterRaw,'AES-GCM',false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(C_IV)},mKey,b64(C_DATA));
  return new TextDecoder().decode(pt);
}
function showApp(html){document.getElementById('gate').style.display='none';const f=document.getElementById('app');f.style.display='block';f.srcdoc=html;}
async function attempt(login,pw,silent){
  try{const html=await unlock(login,pw);sessionStorage.setItem('pa_u',login);sessionStorage.setItem('pa_p',pw);showApp(html);}
  catch(e){if(!silent)document.getElementById('err').textContent='Неверный логин или пароль';}
}
document.getElementById('btn').onclick=()=>attempt(document.getElementById('u').value,document.getElementById('p').value,false);
document.getElementById('p').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('btn').click();});
document.getElementById('u').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('p').focus();});
(function(){const u=sessionStorage.getItem('pa_u'),p=sessionStorage.getItem('pa_p');if(u&&p)attempt(u,p,true);})();
</script>
